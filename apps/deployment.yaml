apiVersion: v1
kind: ConfigMap
metadata:
  name: ecommerce-html
data:
  index.html: |
    <html>
      <head>
        <title>E‑Commerce</title>
      </head>
      <body>
        <h1>Welcome to My E‑Commerce Site</h1>
        <p>Shop amazing products here!</p>
      </body>
    </html>

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-nginx
  labels:
    app: ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ecommerce
  template:
    metadata:
      labels:
        app: ecommerce
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-html
          mountPath: /usr/share/nginx/html
      volumes:
      - name: nginx-html
        configMap:
          name: ecommerce-html

---
apiVersion: v1
kind: Service
metadata:
  name: ecommerce-service
spec:
  selector:
    app: ecommerce
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer
