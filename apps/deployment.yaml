apiVersion: v1
kind: ConfigMap
metadata:
  name: ecommerce-html
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>ColorBurst Shop</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
        <style>
            :root{
                --bg: #0f1226;
                --text: #f7f7fb;
                --muted: #cfd2ff;
                --primary: #7c3aed;
                --secondary: #06b6d4;
                --accent: #f97316;
                --lime: #84cc16;
                --pink: #ec4899;
                --card: #171a35;
                --border: #2a2e57;
                --shadow: 0 10px 30px rgba(0,0,0,.35);
                --radius: 16px;
            }
            *{box-sizing:border-box}
            html,body{margin:0;padding:0;background:linear-gradient(120deg,#0f1226 0%,#12163a 60%,#0f1226 100%);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
            a{color:inherit;text-decoration:none}
            img{max-width:100%;display:block}
            header{position:sticky;top:0;z-index:50;backdrop-filter: saturate(140%) blur(8px);background:linear-gradient(90deg,rgba(124,58,237,.25),rgba(6,182,212,.25));border-bottom:1px solid var(--border)}
            .nav{max-width:1200px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:16px}
            .brand{font-weight:800;letter-spacing:.5px;font-size:1.2rem;background:linear-gradient(90deg,var(--primary),var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent}
            .nav-links{display:flex;gap:18px;margin-left:auto;align-items:center}
            .nav-links a{padding:8px 12px;border-radius:10px;font-weight:600;transition:transform .15s ease, background .15s ease}
            .nav-links a:hover{transform:translateY(-1px);background:rgba(255,255,255,.08)}
            .cta{background:linear-gradient(90deg,var(--accent),var(--secondary));color:#0b1024;padding:8px 14px;border-radius:12px;font-weight:800;box-shadow:var(--shadow)}
            .hero{max-width:1200px;margin:28px auto;padding:24px 20px;display:grid;grid-template-columns:1.2fr .8fr;gap:24px}
            .hero-card{background:linear-gradient(135deg,rgba(124,58,237,.25),rgba(236,72,153,.25));border:1px solid var(--border);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow)}
            .hero h1{font-size:2.2rem;margin:0 0 10px}
            .hero p{color:var(--muted);margin:0 0 18px}
            .hero-actions{display:flex;gap:12px;flex-wrap:wrap}
            .btn{padding:12px 16px;border-radius:12px;font-weight:700;border:0;cursor:pointer;transition:transform .15s ease, box-shadow .15s ease}
            .btn-primary{background:linear-gradient(90deg,var(--primary),var(--secondary));color:#0b1024}
            .btn-secondary{background:linear-gradient(90deg,var(--lime),var(--accent));color:#0b1024}
            .btn:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
            .promo{background:linear-gradient(135deg,rgba(6,182,212,.25),rgba(132,204,22,.25));border:1px solid var(--border);border-radius:var(--radius);padding:24px;display:flex;flex-direction:column;gap:12px;justify-content:center}
            .promo h3{margin:0}
            .promo .badge{display:inline-block;background:linear-gradient(90deg,var(--accent),var(--pink));color:#0b1024;padding:6px 10px;border-radius:999px;font-weight:800}
            section{max-width:1200px;margin:24px auto;padding:0 20px}
            .section-title{display:flex;align-items:center;justify-content:space-between;margin:8px 0 14px}
            .section-title h2{margin:0;font-size:1.6rem}
            .categories{display:grid;grid-template-columns:repeat(6,1fr);gap:14px}
            .cat{background:linear-gradient(135deg,rgba(249,115,22,.25),rgba(124,58,237,.25));border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center;cursor:pointer;transition:transform .15s ease, background .15s ease;font-weight:700}
            .cat:hover{transform:translateY(-2px);background:linear-gradient(135deg,rgba(6,182,212,.25),rgba(236,72,153,.25))}
            .cat small{display:block;color:var(--muted);font-weight:600}
            .filters{display:flex;gap:12px;flex-wrap:wrap;margin:10px 0 18px}
            .input, .select{background:var(--card);color:var(--text);border:1px solid var(--border);padding:10px 12px;border-radius:12px;min-width:220px}
            .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
            .card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column}
            .card .thumb{aspect-ratio:4/3;background:linear-gradient(135deg,rgba(124,58,237,.35),rgba(6,182,212,.35));display:flex;align-items:center;justify-content:center;font-weight:800;color:#0b1024}
            .card .body{padding:14px;display:flex;flex-direction:column;gap:8px}
            .price{font-weight:800;background:linear-gradient(90deg,var(--lime),var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent}
            .tag{display:inline-block;background:rgba(255,255,255,.08);padding:6px 10px;border-radius:999px;font-weight:700}
            .actions{display:flex;gap:10px;margin-top:auto}
            .btn-mini{flex:1;padding:10px;border-radius:10px;border:0;font-weight:800;cursor:pointer}
            .buy{background:linear-gradient(90deg,var(--accent),var(--secondary));color:#0b1024}
            .cart{background:linear-gradient(90deg,var(--primary),var(--pink));color:#0b1024}
            footer{margin-top:40px;border-top:1px solid var(--border);background:linear-gradient(90deg,rgba(124,58,237,.25),rgba(6,182,212,.25))}
            .footer-wrap{max-width:1200px;margin:0 auto;padding:22px 20px;display:grid;grid-template-columns:2fr 1fr 1fr;gap:18px}
            .footer-wrap h4{margin:0 0 10px}
            .links{display:grid;gap:8px}
            .links a{color:var(--muted)}
            .copyright{grid-column:1/-1;color:var(--muted);margin-top:8px}
            @media (max-width:1024px){.hero{grid-template-columns:1fr}.categories{grid-template-columns:repeat(3,1fr)}.grid{grid-template-columns:repeat(3,1fr)}.footer-wrap{grid-template-columns:1fr 1fr}}
            @media (max-width:640px){.nav{flex-wrap:wrap}.categories{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:repeat(2,1fr)}.input,.select{min-width:unset;flex:1}}
        </style>
    </head>
    <body>
        <header>
            <nav class="nav">
                <div class="brand">ColorBurst</div>
                <div class="nav-links">
                    <a href="#home">Home</a>
                    <a href="#products">Products</a>
                    <a href="#categories">Categories</a>
                    <a href="#deals">Deals</a>
                    <a href="#contact">Contact</a>
                    <a class="cta" href="#cart">Cart</a>
                </div>
            </nav>
        </header>
        <main id="home" class="hero">
            <div class="hero-card">
                <h1>Shop bold. Live bright.</h1>
                <p>Discover colorful gear across fashion, gadgets, and home—curated for vibrant everyday moments.</p>
                <div class="hero-actions">
                    <button class="btn btn-primary" onclick="scrollToId('products')">Browse products</button>
                    <button class="btn btn-secondary" onclick="scrollToId('categories')">Explore categories</button>
                </div>
            </div>
            <aside class="promo">
                <span class="badge">New</span>
                <h3>Festival Flash Sale</h3>
                <p>Up to 40% off on selected items. Limited time—grab your favorites now.</p>
            </aside>
        </main>
        <section id="categories">
            <div class="section-title">
                <h2>Categories</h2>
                <small class="tag">Tap to filter</small>
            </div>
            <div class="categories">
                <div class="cat" data-cat="fashion">Fashion<small>Apparel & shoes</small></div>
                <div class="cat" data-cat="gadgets">Gadgets<small>Phones & audio</small></div>
                <div class="cat" data-cat="home">Home<small>Decor & kitchen</small></div>
                <div class="cat" data-cat="fitness">Fitness<small>Gear & wearables</small></div>
                <div class="cat" data-cat="beauty">Beauty<small>Skincare & more</small></div>
                <div class="cat" data-cat="toys">Toys<small>Kids & hobby</small></div>
            </div>
        </section>
        <section id="products">
            <div class="section-title">
                <h2>Products</h2>
                <div class="filters">
                    <input id="search" class="input" type="search" placeholder="Search products…" />
                    <select id="sort" class="select">
                        <option value="popular">Sort: Popular</option>
                        <option value="low">Price: Low to High</option>
                        <option value="high">Price: High to Low</option>
                    </select>
                </div>
            </div>
            <div class="grid" id="grid">
                <article class="card" data-cat="fashion" data-price="1499">
                    <div class="thumb">Fashion Tee</div>
                    <div class="body">
                        <strong>Neon Gradient Tee</strong>
                        <span class="price">₹1,499</span>
                        <small class="tag">Fashion</small>
                        <div class="actions">
                            <button class="btn-mini buy">Buy now</button>
                            <button class="btn-mini cart">Add to cart</button>
                        </div>
                    </div>
                </article>
                <article class="card" data-cat="gadgets" data-price="29999">
                    <div class="thumb">Wireless Headphones</div>
                    <div class="body">
                        <strong>Pulse Pro ANC</strong>
                        <span class="price">₹29,999</span>
                        <small class="tag">Gadgets</small>
                        <div class="actions">
                            <button class="btn-mini buy">Buy now</button>
                            <button class="btn-mini cart">Add to cart</button>
                        </div>
                    </div>
                </article>
                <article class="card" data-cat="home" data-price="2499">
                    <div class="thumb">Smart Lamp</div>
                    <div class="body">
                        <strong>GlowSphere RGB Lamp</strong>
                        <span class="price">₹2,499</span>
                        <small class="tag">Home</small>
                        <div class="actions">
                            <button class="btn-mini buy">Buy now</button>
                            <button class="btn-mini cart">Add to cart</button>
                        </div>
                    </div>
                </article>
                <article class="card" data-cat="fitness" data-price="5999">
                    <div class="thumb">Fitness Band</div>
                    <div class="body">
                        <strong>Stride+ Tracker</strong>
                        <span class="price">₹5,999</span>
                        <small class="tag">Fitness</small>
                        <div class="actions">
                            <button class="btn-mini buy">Buy now</button>
                            <button class="btn-mini cart">Add to cart</button>
                        </div>
                    </div>
                </article>
                <article class="card" data-cat="beauty" data-price="1299">
                    <div class="thumb">Skincare Set</div>
                    <div class="body">
                        <strong>Radiance Trio</strong>
                        <span class="price">₹1,299</span>
                        <small class="tag">Beauty</small>
                        <div class="actions">
                            <button class="btn-mini buy">Buy now</button>
                            <button class="btn-mini cart">Add to cart</button>
                        </div>
                    </div>
                </article>
                <article class="card" data-cat="toys" data-price="1999">
                    <div class="thumb">STEM Kit</div>
                    <div class="body">
                        <strong>RoboBuild Starter</strong>
                        <span class="price">₹1,999</span>
                        <small class="tag">Toys</small>
                        <div class="actions">
                            <button class="btn-mini buy">Buy now</button>
                            <button class="btn-mini cart">Add to cart</button>
                        </div>
                    </div>
                </article>
            </div>
        </section>
        <footer id="contact">
            <div class="footer-wrap">
                <div>
                    <h4>About ColorBurst</h4>
                    <p>We bring playful color and quality craftsmanship together—delighting customers across India.</p>
                </div>
                <div>
                    <h4>Quick links</h4>
                    <div class="links">
                        <a href="#home">Home</a>
                        <a href="#products">Products</a>
                        <a href="#categories">Categories</a>
                        <a href="#deals" id="deals">Deals</a>
                    </div>
                </div>
                <div>
                    <h4>Support</h4>
                    <div class="links">
                        <a href="#">Shipping & returns</a>
                        <a href="#">Privacy & terms</a>
                        <a href="#">Help center</a>
                    </div>
                </div>
                <div class="copyright">© 2026 ColorBurst. All rights reserved.</div>
            </div>
        </footer>
        <script>
            function scrollToId(id){
                document.getElementById(id)?.scrollIntoView({behavior:'smooth',block:'start'});
            }
            const cats = document.querySelectorAll('.cat');
            const cards = document.querySelectorAll('.card');
            cats.forEach(c => c.addEventListener('click', () => {
                const selected = c.dataset.cat;
                cards.forEach(card => {
                    card.style.display = (selected === '' || card.dataset.cat === selected) ? '' : 'none';
                });
                cats.forEach(x => x.style.outline = '');
                c.style.outline = '2px solid #fff';
            }));
            const search = document.getElementById('search');
            search.addEventListener('input', () => {
                const q = search.value.toLowerCase();
                cards.forEach(card => {
                    const name = card.querySelector('strong').textContent.toLowerCase();
                    card.style.display = name.includes(q) ? '' : 'none';
                });
            });
            const sort = document.getElementById('sort');
            sort.addEventListener('change', () => {
                const grid = document.getElementById('grid');
                const items = Array.from(cards);
                if(sort.value === 'low'){
                    items.sort((a,b)=> +a.dataset.price - +b.dataset.price);
                }else if(sort.value === 'high'){
                    items.sort((a,b)=> +b.dataset.price - +a.dataset.price);
                }
                items.forEach(i => grid.appendChild(i));
            });
        </script>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-nginx
  labels:
    app: ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ecommerce
  template:
    metadata:
      labels:
        app: ecommerce
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-html
          mountPath: /usr/share/nginx/html
      volumes:
      - name: nginx-html
        configMap:
          name: ecommerce-html
---
apiVersion: v1
kind: Service
metadata:
  name: ecommerce-service
spec:
  selector:
    app: ecommerce
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer
